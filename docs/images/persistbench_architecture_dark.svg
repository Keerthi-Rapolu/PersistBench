<svg width="1500" height="1080" viewBox="0 0 1500 1080" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PersistBench architecture diagram</title>
  <desc id="desc">Pastel research-paper architecture figure showing input, trace generation, replay orchestration, evaluation, forgetting validation, and output components for PersistBench.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1380" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <radialGradient id="blobA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 180) rotate(45) scale(320 240)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1110 260) rotate(25) scale(360 260)">
      <stop offset="0" stop-color="#ddd6fe" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ddd6fe" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(820 880) rotate(90) scale(260 480)">
      <stop offset="0" stop-color="#dbeafe" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#dbeafe" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="inputPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="tracePanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe4e6"/>
      <stop offset="1" stop-color="#fecdd3"/>
    </linearGradient>
    <linearGradient id="replayPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="evalPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="outputPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ede9fe"/>
      <stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>

    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#94a3b8" flood-opacity="0.14"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.12"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.2" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 34px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #0f172a; letter-spacing: -0.025em; }
      .subtitle { font: 500 15px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #475569; letter-spacing: 0.01em; }
      .section { font: 650 21px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #0f172a; letter-spacing: -0.02em; }
      .sectionMeta { font: 600 11px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #64748b; letter-spacing: 0.16em; text-transform: uppercase; }
      .nodeTitle { font: 650 18px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #0f172a; letter-spacing: -0.015em; }
      .nodeMeta { font: 500 13px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #475569; }
      .smallMeta { font: 500 12px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #64748b; }
      .chip { font: 600 11px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #334155; letter-spacing: 0.08em; text-transform: uppercase; }
      .connector { stroke: #64748b; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); opacity: 0.9; }
      .connectorSoft { stroke: #94a3b8; stroke-width: 1.65; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); opacity: 0.95; }
    </style>
  </defs>

  <rect width="1500" height="1080" rx="32" fill="url(#bg)"/>
  <ellipse cx="360" cy="180" rx="320" ry="240" fill="url(#blobA)"/>
  <ellipse cx="1110" cy="260" rx="360" ry="260" fill="url(#blobB)"/>
  <ellipse cx="820" cy="880" rx="480" ry="260" fill="url(#blobC)"/>

  <g opacity="0.32">
    <path d="M96 118H1404" stroke="#e2e8f0"/>
    <path d="M96 962H1404" stroke="#e2e8f0"/>
  </g>

  <text x="110" y="78" class="title">PersistBench Architecture</text>
  <text x="110" y="108" class="subtitle">Longitudinal replay pipeline for persistent cross-session adversarial evaluation</text>

  <g filter="url(#panelShadow)">
    <rect x="90" y="160" width="260" height="278" rx="22" fill="url(#inputPanel)" fill-opacity="0.82" stroke="#ffffff" stroke-opacity="0.9"/>
    <text x="118" y="204" class="sectionMeta">Stage 1</text>
    <text x="118" y="236" class="section">Input</text>
    <path d="M118 250H320" stroke="#f8fafc" stroke-width="1.5" stroke-opacity="0.9"/>

    <g filter="url(#cardShadow)">
      <rect x="116" y="276" width="208" height="80" rx="16" fill="#ffffff" fill-opacity="0.68" stroke="#ffffff" stroke-opacity="0.92"/>
      <text x="140" y="308" class="nodeTitle">Scenario YAML</text>
      <text x="140" y="332" class="nodeMeta">attack fragments, trigger turns</text>
      <text x="140" y="349" class="smallMeta">suite metadata and timing plan</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="116" y="368" width="208" height="80" rx="16" fill="#ffffff" fill-opacity="0.68" stroke="#ffffff" stroke-opacity="0.92"/>
      <text x="140" y="400" class="nodeTitle">Seed / RNG</text>
      <text x="140" y="424" class="nodeMeta">deterministic replay control</text>
      <text x="140" y="441" class="smallMeta">reproducible trace generation</text>
    </g>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="90" y="486" width="260" height="210" rx="22" fill="url(#tracePanel)" fill-opacity="0.84" stroke="#ffffff" stroke-opacity="0.9"/>
    <text x="118" y="530" class="sectionMeta">Stage 2</text>
    <text x="118" y="562" class="section">Trace Generation</text>
    <path d="M118 576H320" stroke="#f8fafc" stroke-width="1.5" stroke-opacity="0.9"/>

    <g filter="url(#cardShadow)">
      <rect x="116" y="604" width="208" height="82" rx="16" fill="#ffffff" fill-opacity="0.68" stroke="#ffffff" stroke-opacity="0.92"/>
      <text x="140" y="638" class="nodeTitle">SLIS Generator</text>
      <text x="140" y="662" class="nodeMeta">session-level injection sequencer</text>
    </g>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="394" y="148" width="510" height="620" rx="24" fill="url(#replayPanel)" fill-opacity="0.84" stroke="#ffffff" stroke-opacity="0.92"/>
    <text x="426" y="194" class="sectionMeta">Stage 3</text>
    <text x="426" y="226" class="section">Replay Engine</text>
    <path d="M426 240H872" stroke="#f8fafc" stroke-width="1.5" stroke-opacity="0.9"/>

    <g filter="url(#softBlur)" opacity="0.16">
      <rect x="520" y="332" width="256" height="206" rx="28" fill="#60a5fa"/>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="426" y="270" width="446" height="92" rx="18" fill="#ffffff" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.94"/>
      <text x="454" y="304" class="nodeTitle">Defense Middleware</text>
      <text x="454" y="328" class="nodeMeta">PLS, MW, TOH, DEV, PS, CD</text>
      <text x="454" y="347" class="smallMeta">pre-turn, post-turn, and memory-write interception</text>
      <rect x="760" y="286" width="90" height="28" rx="14" fill="#ffffff" fill-opacity="0.72" stroke="#dbeafe"/>
      <text x="780" y="304" class="chip">control</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="472" y="400" width="356" height="146" rx="22" fill="#ffffff" fill-opacity="0.78" stroke="#ffffff" stroke-opacity="0.96"/>
      <text x="508" y="450" class="nodeTitle">ReplayEngine</text>
      <text x="508" y="478" class="nodeMeta">multi-session orchestration across attack, probe, and trigger phases</text>
      <text x="508" y="500" class="smallMeta">deterministic traces, defense hooks, session lifecycle control</text>
      <rect x="508" y="516" width="132" height="30" rx="15" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="532" y="535" class="chip">orchestrator</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="426" y="584" width="202" height="108" rx="18" fill="#ffffff" fill-opacity="0.68" stroke="#ffffff" stroke-opacity="0.92"/>
      <text x="452" y="626" class="nodeTitle">Agent Backend</text>
      <text x="452" y="651" class="nodeMeta">Echo, Claude, OpenAI</text>
      <text x="452" y="670" class="smallMeta">oracle and live-model execution</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="660" y="584" width="212" height="108" rx="18" fill="#ffffff" fill-opacity="0.72" stroke="#ffffff" stroke-opacity="0.94"/>
      <text x="688" y="626" class="nodeTitle">Memory Store</text>
      <text x="688" y="651" class="nodeMeta">DuckDB, Qdrant</text>
      <text x="688" y="670" class="smallMeta">persistent state and retrieval loop</text>
    </g>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="944" y="160" width="282" height="330" rx="22" fill="url(#evalPanel)" fill-opacity="0.84" stroke="#ffffff" stroke-opacity="0.92"/>
    <text x="972" y="204" class="sectionMeta">Stage 4</text>
    <text x="972" y="236" class="section">Evaluation</text>
    <path d="M972 250H1198" stroke="#f8fafc" stroke-width="1.5" stroke-opacity="0.9"/>

    <g filter="url(#cardShadow)">
      <rect x="970" y="278" width="230" height="90" rx="18" fill="#ffffff" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.94"/>
      <text x="996" y="312" class="nodeTitle">Metrics Computation</text>
      <text x="996" y="336" class="nodeMeta">APS, RLS, UPS, BDI, FVS, CRA</text>
      <rect x="996" y="346" width="112" height="24" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text x="1018" y="362" class="chip">analysis</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="962" y="388" width="246" height="86" rx="20" fill="#ffffff" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.96"/>
      <text x="990" y="422" class="nodeTitle">Provenance DAG</text>
      <text x="990" y="446" class="nodeMeta">ancestor and descendant lineage tracing</text>
      <text x="990" y="464" class="smallMeta">causal path inspection for persistent fragments</text>
    </g>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="944" y="520" width="282" height="248" rx="22" fill="url(#evalPanel)" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.92"/>
    <text x="972" y="564" class="sectionMeta">Stage 4b</text>
    <text x="972" y="596" class="section">Forgetting Validation</text>
    <path d="M972 610H1198" stroke="#f8fafc" stroke-width="1.5" stroke-opacity="0.9"/>

    <g filter="url(#softBlur)" opacity="0.14">
      <rect x="984" y="642" width="196" height="94" rx="24" fill="#86efac"/>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="970" y="636" width="230" height="90" rx="20" fill="#ffffff" fill-opacity="0.82" stroke="#ffffff" stroke-opacity="0.98"/>
      <text x="996" y="672" class="nodeTitle">ForgettingValidator</text>
      <text x="996" y="696" class="nodeMeta">FVS-1 through FVS-15</text>
      <text x="996" y="714" class="smallMeta">deletion completeness and resurfacing checks</text>
    </g>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="1260" y="212" width="210" height="490" rx="22" fill="url(#outputPanel)" fill-opacity="0.84" stroke="#ffffff" stroke-opacity="0.92"/>
    <text x="1288" y="256" class="sectionMeta">Stage 5</text>
    <text x="1288" y="288" class="section">Output</text>
    <path d="M1288 302H1442" stroke="#f8fafc" stroke-width="1.5" stroke-opacity="0.9"/>

    <g filter="url(#cardShadow)">
      <rect x="1284" y="334" width="162" height="130" rx="20" fill="#ffffff" fill-opacity="0.78" stroke="#ffffff" stroke-opacity="0.96"/>
      <ellipse cx="1365" cy="362" rx="50" ry="12" fill="#ede9fe" stroke="#c4b5fd"/>
      <path d="M1315 362V430C1315 437 1337 444 1365 444C1393 444 1415 437 1415 430V362" stroke="#a78bfa" fill="none"/>
      <text x="1330" y="394" class="nodeTitle">DuckDB</text>
      <text x="1326" y="418" class="nodeMeta">analytical store</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="1284" y="490" width="162" height="88" rx="18" fill="#ffffff" fill-opacity="0.68" stroke="#ffffff" stroke-opacity="0.92"/>
      <text x="1312" y="524" class="nodeTitle">Artifact Export</text>
      <text x="1312" y="548" class="nodeMeta">JSON, CSV, HTML, MD</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="1284" y="602" width="162" height="88" rx="18" fill="#ffffff" fill-opacity="0.68" stroke="#ffffff" stroke-opacity="0.92"/>
      <text x="1312" y="636" class="nodeTitle">Dashboard</text>
      <text x="1312" y="660" class="nodeMeta">7-page Streamlit observability</text>
    </g>
  </g>

  <path class="connector" d="M324 316C378 316 382 642 324 642"/>
  <path class="connector" d="M324 408C374 408 378 642 324 642"/>
  <path class="connector" d="M324 642C372 642 382 642 426 642"/>
  <path class="connector" d="M324 642C384 642 388 472 472 472"/>

  <path class="connectorSoft" d="M650 362C650 382 650 388 650 400"/>
  <path class="connectorSoft" d="M650 546C650 568 528 568 528 584"/>
  <path class="connectorSoft" d="M650 546C650 568 766 568 766 584"/>
  <path class="connectorSoft" d="M628 638C640 638 648 638 660 638"/>
  <path class="connectorSoft" d="M766 584C766 560 706 552 690 546"/>

  <path class="connector" d="M828 472C906 472 916 324 970 324"/>
  <path class="connectorSoft" d="M828 472C904 472 918 430 962 430"/>
  <path class="connectorSoft" d="M828 472C918 472 930 680 970 680"/>

  <path class="connector" d="M1200 324C1240 324 1246 372 1284 372"/>
  <path class="connectorSoft" d="M1208 430C1248 430 1248 388 1284 388"/>
  <path class="connectorSoft" d="M1200 680C1246 680 1248 404 1284 404"/>
  <path class="connectorSoft" d="M1365 464C1365 480 1365 486 1365 490"/>
  <path class="connectorSoft" d="M1365 464C1365 532 1365 548 1365 602"/>

  <circle cx="324" cy="642" r="4" fill="#64748b"/>
  <circle cx="828" cy="472" r="4" fill="#64748b"/>
  <circle cx="1200" cy="324" r="4" fill="#64748b"/>

  <text x="110" y="1002" class="smallMeta">Replay orchestration stays central while provenance analysis, forgetting validation, and durable storage remain visually distinct for security benchmarking.</text>
</svg>
