<svg width="1460" height="820" viewBox="0 0 1460 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PersistBench architecture diagram</title>
  <desc id="desc">Pastel research-paper architecture figure showing input, trace generation, replay orchestration, evaluation, forgetting validation, and output components for PersistBench.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1380" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 160) rotate(28) scale(300 220)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1100 190) rotate(18) scale(320 220)">
      <stop offset="0" stop-color="#ddd6fe" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#ddd6fe" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 700) rotate(90) scale(160 380)">
      <stop offset="0" stop-color="#dbeafe" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#dbeafe" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="inputPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="tracePanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe4e6"/>
      <stop offset="1" stop-color="#fecdd3"/>
    </linearGradient>
    <linearGradient id="replayPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="evalPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="outputPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ede9fe"/>
      <stop offset="1" stop-color="#ddd6fe"/>
    </linearGradient>

    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#94a3b8" flood-opacity="0.14"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#94a3b8" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 34px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #0f172a; letter-spacing: -0.025em; }
      .subtitle { font: 500 15px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #475569; letter-spacing: 0.01em; }
      .section { font: 650 19px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #0f172a; letter-spacing: -0.02em; }
      .sectionMeta { font: 600 10px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #64748b; letter-spacing: 0.16em; text-transform: uppercase; }
      .nodeTitle { font: 650 16px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #0f172a; letter-spacing: -0.015em; }
      .nodeMeta { font: 500 12px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #475569; }
      .smallMeta { font: 500 11px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #64748b; }
      .chip { font: 600 10px 'Inter', 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #334155; letter-spacing: 0.08em; text-transform: uppercase; }
      .connector { stroke: #64748b; stroke-width: 1.9; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); opacity: 0.92; }
      .connectorSoft { stroke: #94a3b8; stroke-width: 1.55; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); opacity: 0.95; }
      .mutedLine { stroke: #ffffff; stroke-opacity: 0.85; stroke-width: 1.35; }
    </style>
  </defs>

  <rect width="1460" height="820" rx="28" fill="url(#bg)"/>
  <ellipse cx="320" cy="160" rx="300" ry="220" fill="url(#glowA)"/>
  <ellipse cx="1100" cy="190" rx="320" ry="220" fill="url(#glowB)"/>
  <ellipse cx="720" cy="700" rx="380" ry="160" fill="url(#glowC)"/>

  <text x="78" y="68" class="title">PersistBench Architecture</text>
  <text x="78" y="95" class="subtitle">Longitudinal replay pipeline for persistent cross-session adversarial evaluation</text>

  <g filter="url(#panelShadow)">
    <rect x="60" y="120" width="246" height="250" rx="22" fill="url(#inputPanel)" fill-opacity="0.84" stroke="#ffffff" stroke-opacity="0.92"/>
    <text x="84" y="150" class="sectionMeta">Stage 1</text>
    <text x="84" y="176" class="section">Input</text>
    <path d="M84 188H284" class="mutedLine"/>

    <g filter="url(#cardShadow)">
      <rect x="78" y="204" width="146" height="58" rx="16" fill="#ffffff" fill-opacity="0.74" stroke="#ffffff" stroke-opacity="0.94"/>
      <text x="94" y="227" class="nodeTitle">Scenario YAML</text>
      <text x="94" y="245" class="nodeMeta">attack fragments, trigger turns</text>
      <text x="94" y="257" class="smallMeta">suite metadata and timing plan</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="78" y="274" width="146" height="58" rx="16" fill="#ffffff" fill-opacity="0.74" stroke="#ffffff" stroke-opacity="0.94"/>
      <text x="94" y="297" class="nodeTitle">Seed / RNG</text>
      <text x="94" y="315" class="nodeMeta">deterministic replay control</text>
      <text x="94" y="327" class="smallMeta">reproducible trace generation</text>
    </g>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="60" y="398" width="246" height="170" rx="22" fill="url(#tracePanel)" fill-opacity="0.84" stroke="#ffffff" stroke-opacity="0.92"/>
    <text x="84" y="428" class="sectionMeta">Stage 2</text>
    <text x="84" y="454" class="section">Trace Generation</text>
    <path d="M84 466H284" class="mutedLine"/>

    <g filter="url(#cardShadow)">
      <rect x="78" y="480" width="150" height="58" rx="16" fill="#ffffff" fill-opacity="0.74" stroke="#ffffff" stroke-opacity="0.94"/>
      <text x="94" y="504" class="nodeTitle">SLIS Generator</text>
      <text x="94" y="522" class="nodeMeta">session-level injection</text>
      <text x="94" y="534" class="smallMeta">sequencer</text>
    </g>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="344" y="114" width="500" height="530" rx="24" fill="url(#replayPanel)" fill-opacity="0.84" stroke="#ffffff" stroke-opacity="0.94"/>
    <text x="370" y="146" class="sectionMeta">Stage 3</text>
    <text x="370" y="172" class="section">Replay Engine</text>
    <path d="M370 184H820" class="mutedLine"/>

    <g filter="url(#cardShadow)">
      <rect x="372" y="204" width="456" height="66" rx="18" fill="#ffffff" fill-opacity="0.76" stroke="#ffffff" stroke-opacity="0.96"/>
      <text x="392" y="229" class="nodeTitle">Defense Middleware</text>
      <text x="392" y="247" class="nodeMeta">PLS, MW, TOH, DEV, PS, CD</text>
      <text x="392" y="259" class="smallMeta">pre-turn, post-turn, and memory-write interception</text>
      <rect x="744" y="216" width="66" height="20" rx="10" fill="#ffffff" fill-opacity="0.7" stroke="#dbeafe"/>
      <text x="758" y="230" class="chip">control</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="430" y="296" width="330" height="110" rx="22" fill="#ffffff" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.98"/>
      <text x="456" y="331" class="nodeTitle">ReplayEngine</text>
      <text x="456" y="352" class="nodeMeta">multi-session orchestration across attack,</text>
      <text x="456" y="366" class="nodeMeta">probe, and trigger phases</text>
      <text x="456" y="381" class="smallMeta">deterministic traces, defense hooks,</text>
      <text x="456" y="394" class="smallMeta">session lifecycle control</text>
      <rect x="624" y="374" width="116" height="24" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="648" y="390" class="chip">orchestrator</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="392" y="454" width="144" height="86" rx="18" fill="#ffffff" fill-opacity="0.74" stroke="#ffffff" stroke-opacity="0.94"/>
      <text x="410" y="487" class="nodeTitle">Agent Backend</text>
      <text x="410" y="507" class="nodeMeta">Echo, Claude, OpenAI</text>
      <text x="410" y="521" class="smallMeta">oracle and live-model</text>
      <text x="410" y="533" class="smallMeta">execution</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="586" y="454" width="160" height="86" rx="18" fill="#ffffff" fill-opacity="0.74" stroke="#ffffff" stroke-opacity="0.94"/>
      <text x="604" y="487" class="nodeTitle">Memory Store</text>
      <text x="604" y="507" class="nodeMeta">DuckDB, Qdrant</text>
      <text x="604" y="521" class="smallMeta">persistent state and</text>
      <text x="604" y="533" class="smallMeta">retrieval loop</text>
    </g>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="882" y="120" width="252" height="236" rx="22" fill="url(#evalPanel)" fill-opacity="0.84" stroke="#ffffff" stroke-opacity="0.92"/>
    <text x="906" y="150" class="sectionMeta">Stage 4</text>
    <text x="906" y="176" class="section">Evaluation</text>
    <path d="M906 188H1110" class="mutedLine"/>

    <g filter="url(#cardShadow)">
      <rect x="900" y="204" width="216" height="64" rx="18" fill="#ffffff" fill-opacity="0.76" stroke="#ffffff" stroke-opacity="0.96"/>
      <text x="920" y="229" class="nodeTitle">Metrics Computation</text>
      <text x="920" y="247" class="nodeMeta">APS, RLS, UPS, BDI, FVS, CRA</text>
      <rect x="920" y="252" width="82" height="18" rx="9" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text x="939" y="265" class="chip">analysis</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="900" y="282" width="216" height="62" rx="18" fill="#ffffff" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.98"/>
      <text x="920" y="307" class="nodeTitle">Provenance DAG</text>
      <text x="920" y="325" class="nodeMeta">ancestor and descendant</text>
      <text x="920" y="339" class="nodeMeta">lineage tracing</text>
    </g>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="882" y="382" width="252" height="186" rx="22" fill="url(#evalPanel)" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.92"/>
    <text x="906" y="412" class="sectionMeta">Stage 4b</text>
    <text x="906" y="438" class="section">Forgetting Validation</text>
    <path d="M906 450H1110" class="mutedLine"/>

    <g filter="url(#cardShadow)">
      <rect x="900" y="468" width="216" height="70" rx="20" fill="#ffffff" fill-opacity="0.82" stroke="#ffffff" stroke-opacity="0.98"/>
      <text x="920" y="495" class="nodeTitle">ForgettingValidator</text>
      <text x="920" y="514" class="nodeMeta">FVS-1 through FVS-15</text>
      <text x="920" y="527" class="smallMeta">deletion completeness and</text>
      <text x="920" y="539" class="smallMeta">resurfacing checks</text>
    </g>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="1170" y="158" width="214" height="410" rx="22" fill="url(#outputPanel)" fill-opacity="0.84" stroke="#ffffff" stroke-opacity="0.92"/>
    <text x="1194" y="188" class="sectionMeta">Stage 5</text>
    <text x="1194" y="214" class="section">Output</text>
    <path d="M1194 226H1358" class="mutedLine"/>

    <g filter="url(#cardShadow)">
      <rect x="1192" y="242" width="170" height="120" rx="20" fill="#ffffff" fill-opacity="0.78" stroke="#ffffff" stroke-opacity="0.96"/>
      <ellipse cx="1277" cy="268" rx="36" ry="9" fill="#ede9fe" stroke="#c4b5fd"/>
      <path d="M1241 268V330C1241 335 1257 340 1277 340C1297 340 1313 335 1313 330V268" stroke="#a78bfa" fill="none"/>
      <text x="1252" y="294" class="nodeTitle">DuckDB</text>
      <text x="1248" y="314" class="nodeMeta">analytical store</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="1192" y="384" width="170" height="68" rx="18" fill="#ffffff" fill-opacity="0.74" stroke="#ffffff" stroke-opacity="0.94"/>
      <text x="1210" y="411" class="nodeTitle">Artifact Export</text>
      <text x="1210" y="430" class="nodeMeta">JSON, CSV, HTML, MD</text>
    </g>

    <g filter="url(#cardShadow)">
      <rect x="1192" y="474" width="170" height="68" rx="18" fill="#ffffff" fill-opacity="0.74" stroke="#ffffff" stroke-opacity="0.94"/>
      <text x="1210" y="501" class="nodeTitle">Dashboard</text>
      <text x="1210" y="520" class="nodeMeta">7-page Streamlit</text>
      <text x="1210" y="533" class="smallMeta">observability</text>
    </g>
  </g>

  <path class="connectorSoft" d="M224 233C294 233 318 332 318 466"/>
  <path class="connectorSoft" d="M224 303C288 303 312 374 318 466"/>
  <path class="connector" d="M318 466C318 494 300 509 228 509"/>

  <path class="connector" d="M228 509C300 509 336 350 430 350"/>
  <path class="connectorSoft" d="M600 270C600 284 600 284 600 296"/>
  <path class="connectorSoft" d="M532 406C532 430 464 430 464 454"/>
  <path class="connectorSoft" d="M658 406C658 430 666 430 666 454"/>
  <path class="connectorSoft" d="M536 497C556 497 566 497 586 497"/>
  <path class="connectorSoft" d="M666 454C666 432 636 422 620 406"/>

  <path class="connector" d="M760 350C844 350 858 236 900 236"/>
  <path class="connectorSoft" d="M760 350C846 350 860 313 900 313"/>
  <path class="connectorSoft" d="M760 350C854 350 872 503 900 503"/>

  <path class="connector" d="M1116 236C1152 236 1164 276 1192 276"/>
  <path class="connectorSoft" d="M1116 313C1152 313 1164 292 1192 292"/>
  <path class="connectorSoft" d="M1116 503C1160 503 1168 308 1192 308"/>
  <path class="connectorSoft" d="M1277 362C1277 374 1277 374 1277 384"/>
  <path class="connectorSoft" d="M1277 452C1277 464 1277 464 1277 474"/>

  <circle cx="318" cy="466" r="3.5" fill="#64748b"/>
  <circle cx="760" cy="350" r="3.5" fill="#64748b"/>
  <circle cx="1116" cy="236" r="3.5" fill="#64748b"/>

  <text x="78" y="758" class="smallMeta">Replay orchestration stays central while provenance analysis, forgetting validation, and durable storage remain visually distinct for security benchmarking.</text>
</svg>
